<style>
:root{color-scheme:dark;--bg:#050608;--panel:rgba(18,21,27,.9);--panel2:rgba(31,36,46,.86);--line:rgba(232,238,255,.12);--strong:rgba(96,226,232,.55);--text:#f1f5f9;--muted:#a5b2c0;--dim:#748190;--cyan:#60e2e8;--blue:#79a7ff;--green:#7be3a2;--red:#ff8b8b;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif}*{box-sizing:border-box}body{margin:0;background:#050608;color:var(--text);letter-spacing:0;-webkit-font-smoothing:antialiased}button,input{font:inherit}button{border:0;color:inherit;cursor:pointer}#bg{position:fixed;inset:0;width:100%;height:100%;opacity:.55;pointer-events:none}.app{position:relative;z-index:1;width:min(100%,440px);min-height:100svh;margin:auto;padding:env(safe-area-inset-top) 16px calc(86px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(5,6,8,.6),rgba(5,6,8,.96) 44%,#050608),radial-gradient(circle at 80% 4%,rgba(96,226,232,.15),transparent 34%)}.top{position:sticky;top:0;z-index:4;display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px;backdrop-filter:blur(18px)}.brand{display:flex;gap:10px;align-items:center}.mark{width:36px;height:36px;border-radius:8px;border:1px solid var(--strong);display:grid;place-items:center;background:rgba(96,226,232,.13)}.dot{width:14px;height:14px;border-radius:50%;background:var(--cyan);box-shadow:0 0 22px var(--cyan);animation:pulse 1.8s infinite}@keyframes pulse{50%{transform:scale(1.15);opacity:.75}}h1,h2,h3,h4,p{margin:0}h1{font-size:18px}.sub,.small{color:var(--muted);font-size:12px}.hero,.panel,.metric,.card{border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 14px 38px rgba(0,0,0,.28)}.hero{padding:18px;background:linear-gradient(145deg,rgba(96,226,232,.17),rgba(121,167,255,.08),rgba(123,227,162,.06))}.hero h2{font-size:24px;line-height:1.15;margin:8px 0}.kicker{font-size:12px;color:var(--cyan);font-weight:800}.grid{display:grid;gap:12px;margin-top:14px}.two{grid-template-columns:1fr 1fr}.metric{padding:14px}.label{font-size:12px;color:var(--muted)}.value{margin-top:7px;font-size:25px;font-weight:850}.note{margin-top:6px;color:var(--dim);font-size:12px}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:10px}.bar span{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--green),var(--cyan))}.panel{padding:15px;margin-top:14px}.row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.field{display:grid;gap:7px;margin-bottom:11px}label{font-size:12px;color:var(--muted)}input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.07);color:var(--text);padding:12px;outline:0}input:focus{border-color:var(--strong);box-shadow:0 0 0 3px rgba(96,226,232,.12)}.primary,.ghost,.chip,.icon{min-height:42px;border-radius:8px}.primary{width:100%;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#061014;font-weight:850}.ghost,.chip,.icon{background:rgba(255,255,255,.07);border:1px solid var(--line)}.icon{width:38px;height:38px;display:grid;place-items:center}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:0 12px;font-size:13px}.chip.active{border-color:var(--strong);background:rgba(96,226,232,.15);color:#effcff}.screen{display:none;padding-top:8px}.screen.active{display:block}.card{width:100%;padding:12px;margin-top:10px;text-align:left}.card.selected{border-color:var(--strong);background:rgba(96,226,232,.12)}.card p{color:var(--muted);font-size:12px;line-height:1.45;margin-top:4px}.macro{color:var(--green);font-weight:850;font-size:13px;white-space:nowrap}.danger{background:transparent;color:var(--red);padding:4px}.empty{color:var(--dim);font-size:13px;line-height:1.5;padding:10px 0}.section-label{margin:16px 0 8px;color:var(--muted);font-size:12px;font-weight:850}.segment{display:grid;grid-template-columns:1fr 1fr;gap:8px}.add{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;min-height:48px;margin-top:10px;border-radius:8px;border:1px dashed var(--strong);background:rgba(96,226,232,.08);color:var(--cyan);font-weight:850}.tabs{position:fixed;left:50%;bottom:0;z-index:8;transform:translateX(-50%);width:min(100%,440px);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px calc(8px + env(safe-area-inset-bottom));background:rgba(5,6,8,.88);border-top:1px solid var(--line);backdrop-filter:blur(20px)}.tab{display:grid;place-items:center;gap:3px;min-height:54px;border-radius:8px;background:transparent;color:var(--dim);font-size:11px}.tab.active{color:var(--cyan);background:rgba(96,226,232,.1)}svg{width:20px;height:20px}dialog{width:min(calc(100% - 28px),410px);border:1px solid var(--line);border-radius:8px;background:#10141c;color:var(--text);box-shadow:0 18px 48px rgba(0,0,0,.38)}dialog::backdrop{background:rgba(0,0,0,.62)}.dialog-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.ai-chart{height:164px;margin-top:8px}.ai-chart svg{width:100%;height:100%;display:block}.ai-axis{stroke:rgba(232,238,255,.14);stroke-width:1}.ai-line{fill:none;stroke:var(--cyan);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 8px rgba(96,226,232,.35))}.ai-area{fill:url(#aiArea)}.ai-point{fill:#050608;stroke:var(--cyan);stroke-width:2}.ai-today{fill:var(--green);stroke:rgba(123,227,162,.35);stroke-width:6}.ai-label{fill:var(--muted);font-size:11px}.ai-score{fill:var(--text);font-size:11px;font-weight:800}.advice{display:grid;gap:8px;margin-top:12px}.advice-item{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:8px;padding:10px}.advice-item strong{display:block;font-size:13px}.advice-item span{display:block;margin-top:3px;color:var(--muted);font-size:12px;line-height:1.4}@media(max-width:360px){.app{padding-left:12px;padding-right:12px}.hero h2{font-size:22px}.value{font-size:22px}}
</style>

<body>
<canvas id="bg"></canvas>
<main class="app">
<header class="top"><div class="brand"><div class="mark"><span class="dot"></span></div><div><h1>CORE_OS</h1><p class="sub">健身 · 飲食 · 每日紀錄</p></div></div><button class="icon" id="resetBtn" title="清空今日紀錄" aria-label="清空今日紀錄"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/></svg></button></header>
<section class="screen active" data-screen="home"><div class="hero"><p class="kicker">今日狀態</p><h2 id="heroTitle">把訓練和蛋白質補齊</h2><p class="sub">先記一餐，再完成一個訓練動作。每天一點點，比一次爆衝更容易留下來。</p></div><div class="grid two"><div class="metric"><p class="label">蛋白質</p><p class="value"><span id="proteinNow">0</span>g</p><div class="bar"><span id="proteinBar"></span></div><p class="note">目標 <span id="proteinGoalText">120</span>g</p></div><div class="metric"><p class="label">熱量</p><p class="value"><span id="calorieNow">0</span></p><div class="bar"><span id="calorieBar"></span></div><p class="note">目標 <span id="calorieGoalText">2200</span> kcal</p></div></div><div class="panel"><div class="title"><h3>每週訓練強度</h3><span class="small" id="aiScoreLabel">離線 AI 評估</span></div><div class="ai-chart" id="intensityChart"></div><div class="advice" id="aiAdvice"></div></div><div class="panel"><div class="title"><h3>今天訓練</h3><span class="small" id="trainingSummary">尚未開始</span></div><div id="todaySets"></div></div></section>
<section class="screen" data-screen="meals"><div class="panel"><div class="title"><h3>新增餐點</h3><span class="small">快速補蛋白</span></div><div class="chips" id="quickButtons" style="margin-bottom:12px"></div><button class="add" id="openQuick" type="button" style="margin-bottom:12px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新增餐點快捷鍵</button><form id="mealForm"><div class="field"><label for="mealName">餐點名稱</label><input id="mealName" autocomplete="off" placeholder="例如：雞胸便當"></div><div class="grid two" style="margin-top:0"><div class="field"><label for="mealProtein">蛋白質 g</label><input id="mealProtein" type="number" min="0" step="1" placeholder="35"></div><div class="field"><label for="mealCalories">熱量 kcal</label><input id="mealCalories" type="number" min="0" step="1" placeholder="520"></div></div><div class="grid two" style="margin-top:0"><div class="field"><label for="mealCarbs">碳水 g</label><input id="mealCarbs" type="number" min="0" step="1" placeholder="55"></div><div class="field"><label for="mealFat">脂肪 g</label><input id="mealFat" type="number" min="0" step="1" placeholder="15"></div></div><button class="primary" type="submit">加入餐點</button></form></div><div class="panel"><div class="title"><h3>今日餐點</h3><span class="small" id="mealCount">0 筆</span></div><div id="mealList"></div></div></section>
<section class="screen" data-screen="training"><div class="panel"><div class="title"><h3>訓練分類</h3><span class="small">先選大方向</span></div><div class="segment" id="zoneButtons"></div><p class="section-label">部位</p><div class="chips" id="muscleButtons"></div></div><div class="panel"><div class="title"><h3 id="exerciseTitle">動作</h3><span class="small">參考肌肉網動作大全整理</span></div><div id="exerciseList"></div><button class="add" id="openCustom" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>新增自己的動作</button></div><div class="panel"><div class="title"><h3>記錄組數</h3><span class="small" id="selectedExerciseText">請先選動作</span></div><p class="empty" id="setStatus" style="padding-top:0"></p><form id="setForm"><div class="grid two" style="margin-top:0"><div class="field"><label for="repsInput">每組幾下</label><input id="repsInput" type="number" min="1" step="1" placeholder="12"></div><div class="field"><label for="setsInput">做幾組</label><input id="setsInput" type="number" min="1" step="1" placeholder="4"></div></div><button class="primary" type="submit">加入訓練紀錄</button></form><div id="setList"></div></div></section>
<section class="screen" data-screen="profile"><div class="panel"><div class="title"><h3>個人目標</h3><span class="small">存在這支手機</span></div><form id="profileForm"><div class="grid two" style="margin-top:0"><div class="field"><label for="weightInput">體重 kg</label><input id="weightInput" type="number" min="1" step="0.1"></div><div class="field"><label for="heightInput">身高 cm</label><input id="heightInput" type="number" min="1" step="0.1"></div></div><div class="grid two" style="margin-top:0"><div class="field"><label for="proteinGoalInput">蛋白質目標 g</label><input id="proteinGoalInput" type="number" min="1" step="1"></div><div class="field"><label for="calorieGoalInput">熱量目標 kcal</label><input id="calorieGoalInput" type="number" min="1" step="1"></div></div><button class="primary" type="submit">儲存目標</button></form></div><div class="panel"><div class="title"><h3>今日總結</h3><span class="small" id="dateText"></span></div><div id="dailyReview"></div></div></section>
</main>
<nav class="tabs"><button class="tab active" data-tab="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5V21H3z"/><path d="M9 21v-7h6v7"/></svg><span>首頁</span></button><button class="tab" data-tab="meals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 3v8a4 4 0 0 0 8 0V3"/><path d="M8 3v18"/><path d="M19 3v18"/></svg><span>餐點</span></button><button class="tab" data-tab="training"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 7v10M18 7v10M3 12h18"/><path d="M6 9H4v6h2M18 9h2v6h-2"/></svg><span>訓練</span></button><button class="tab" data-tab="profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span>目標</span></button></nav>
<dialog id="quickDialog"><form id="quickForm" method="dialog"><div class="title"><h3>新增餐點快捷鍵</h3><button class="icon" type="button" id="closeQuick"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div class="field"><label for="quickName">快捷鍵名稱</label><input id="quickName" autocomplete="off" placeholder="例如：牛奶"></div><div class="grid two" style="margin-top:0"><div class="field"><label for="quickProtein">蛋白質 g</label><input id="quickProtein" type="number" min="0" step="1" placeholder="8"></div><div class="field"><label for="quickCalories">熱量 kcal</label><input id="quickCalories" type="number" min="0" step="1" placeholder="150"></div></div><div class="grid two" style="margin-top:0"><div class="field"><label for="quickCarbs">碳水 g</label><input id="quickCarbs" type="number" min="0" step="1" placeholder="12"></div><div class="field"><label for="quickFat">脂肪 g</label><input id="quickFat" type="number" min="0" step="1" placeholder="5"></div></div><div class="dialog-actions"><button class="ghost" type="button" id="cancelQuick">取消</button><button class="primary" type="submit">新增</button></div></form></dialog>
<dialog id="customDialog"><form id="customForm" method="dialog"><div class="title"><h3>新增自己的動作</h3><button class="icon" type="button" id="closeCustom"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div><div class="field"><label for="customExerciseName">動作名稱</label><input id="customExerciseName" autocomplete="off" placeholder="例如：彈力帶划船"></div><p class="small">會加入目前選到的部位分類。</p><div class="dialog-actions"><button class="ghost" type="button" id="cancelCustom">取消</button><button class="primary" type="submit">新增</button></div></form></dialog>
<script>
var storeKey='core-os-zh-v5';
var defaultQuicks=[{name:'雞蛋',protein:6,calories:70,carbs:0,fat:5},{name:'蛋白飲',protein:20,calories:120,carbs:4,fat:2}];
var library={upper:{label:'上半身',muscles:{chest:{label:'胸部',items:['伏地挺身','變式伏地挺身','平板槓鈴臥推','啞鈴臥推','上斜啞鈴推舉','上斜啞鈴飛鳥','器械胸部推舉','十字夾胸','雙槓臂屈伸','平板啞鈴飛鳥','下斜槓鈴臥推','窄距槓鈴臥推']},shoulder:{label:'肩部',items:['啞鈴肩上推舉','槓鈴肩上推舉','阿諾德推舉','側平舉','坐姿側平舉','反向飛鳥','反向器械飛鳥','槓鈴片前平舉','啞鈴交替前舉','槓鈴直立划船','啞鈴聳肩','史密斯肩上推舉']},back:{label:'背部',items:['引體向上','寬握下拉','坐姿繩索划船','俯身槓鈴划船','單臂啞鈴划船','俯身啞鈴划船','V型引體','T型杆划船','山羊挺身','反向划船','超人式']},abs:{label:'腹部',items:['棒式','仰臥起坐','負重仰臥起坐','下斜仰臥起坐','上斜反向卷腹','懸垂腿舉','仰臥抬腿','繩索卷腹','坐姿槓鈴扭轉','登山者']}}},lower:{label:'下半身',muscles:{thigh:{label:'大腿',items:['槓鈴深蹲','頸前深蹲','哈克深蹲','腿舉','腿屈伸','箭步蹲行走','槓鈴箭步蹲','保加利亞分腿蹲','直腿硬拉','啞鈴直腿硬拉','屈腿硬拉','坐姿腿彎舉','站姿腿彎舉','俯身腿彎舉','俯身鞠躬']},calf:{label:'小腿',items:['站姿提踵','單腳站姿提踵','坐姿提踵','騎驢提踵','腿舉器提踵','站姿腿彎舉']}}}};
var base={profile:{weight:70,height:170,proteinGoal:120,calorieGoal:2200},meals:[],quicks:[],history:{},training:{zone:'upper',muscle:'chest',selectedExercise:'',sets:[],minutes:0,custom:{}}};
var state=load();function load(){try{var s=JSON.parse(localStorage.getItem(storeKey))||{};var c=JSON.parse(JSON.stringify(base));Object.assign(c.profile,s.profile||{});c.meals=Array.isArray(s.meals)?s.meals:[];c.quicks=Array.isArray(s.quicks)?s.quicks:[];c.history=s.history&&typeof s.history==='object'?s.history:{};Object.assign(c.training,s.training||{});if(!c.training.custom)c.training.custom={};if(!Array.isArray(c.training.sets))c.training.sets=[];return c}catch(e){return JSON.parse(JSON.stringify(base))}}function save(){localStorage.setItem(storeKey,JSON.stringify(state))}function id(x){return document.getElementById(x)}function num(x){return Math.round(Number(x)||0)}function total(f){return state.meals.reduce(function(a,b){return a+(Number(b[f])||0)},0)}function esc(t){return String(t).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]})}function muscles(){return library[state.training.zone].muscles}function muscle(){return muscles()[state.training.muscle]}function mkey(){return state.training.zone+':'+state.training.muscle}function exercises(){return muscle().items.concat(state.training.custom[mkey()]||[])}function hint(n){return n==='棒式'?'可把維持秒數填在「幾下」，例如 45 秒就填 45。':'選好後輸入每組次數與總組數，會加入今日訓練。'}function mealHtml(it,i){return '<article class="card"><div class="row"><div><h4>'+esc(it.name)+'</h4><p>碳水 '+num(it.carbs)+'g · 脂肪 '+num(it.fat)+'g · '+num(it.calories)+' kcal</p></div><div><div class="macro">'+num(it.protein)+'g 蛋白</div><button class="danger" data-rm-meal="'+i+'">刪除</button></div></div></article>'}function setHtml(it,i){return '<div class="card"><div class="row"><div><h4>'+esc(it.exercise)+'</h4><p>'+esc(it.muscleLabel)+' · '+num(it.reps)+' 下 × '+num(it.sets)+' 組</p></div><button class="danger" data-rm-set="'+i+'">刪除</button></div></div>'}function dateKey(d){return d.toISOString().slice(0,10)}function todayKey(){return dateKey(new Date())}function dayLabel(i){return ['一','二','三','四','五','六','日'][i]}function weekStart(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x}function weekKeys(){var start=weekStart(new Date()),arr=[];for(var i=0;i<7;i++){var d=new Date(start);d.setDate(start.getDate()+i);arr.push({key:dateKey(d),label:dayLabel(i),isToday:dateKey(d)===todayKey()})}return arr}function dayRecord(key){if(!state.history)state.history={};if(!state.history[key])state.history[key]={sets:[],minutes:0};return state.history[key]}function syncToday(){var rec=dayRecord(todayKey());rec.sets=state.training.sets.slice();rec.minutes=state.training.minutes||0}function calcIntensity(rec){var sets=rec&&rec.sets?rec.sets:[],minutes=rec&&rec.minutes?rec.minutes:0,totalSets=0,totalReps=0,parts={};sets.forEach(function(s){totalSets+=Number(s.sets)||0;totalReps+=(Number(s.reps)||0)*(Number(s.sets)||0);if(s.muscleLabel)parts[s.muscleLabel]=1});var variety=Object.keys(parts).length;return Math.min(100,Math.round(totalSets*6+totalReps*.45+sets.length*4+minutes*.4+variety*3))}function intensityLevel(score){return score<35?'偏低':score<70?'適中':'偏高'}function renderIntensity(){syncToday();var days=weekKeys(),scores=days.map(function(d){return calcIntensity(dayRecord(d.key))}),todayIndex=days.findIndex(function(d){return d.isToday}),todayScore=scores[todayIndex<0?0:todayIndex]||0,maxScore=Math.max.apply(null,scores),maxIndex=scores.indexOf(maxScore),prev=scores.slice(0,Math.max(0,todayIndex)),prevAvg=prev.length?prev.reduce(function(a,b){return a+b},0)/prev.length:0,improve=todayIndex<=0?'今天是本週第一天，先建立基準。':todayScore>=prevAvg?'比本週前面平均更進步。':'比本週前面平均低，明天可以慢慢補回來。',highStreak=0;for(var i=todayIndex;i>=0;i--){if(scores[i]>=70)highStreak++;else break}var rest=highStreak>=2?'已連續 '+highStreak+' 天偏高，建議安排恢復或低強度。':'目前沒有連續過高，照身體狀態調整即可。';var w=320,h=150,pad=24,baseY=112,topY=16,points=scores.map(function(s,i){var x=pad+i*((w-pad*2)/6),y=baseY-(s/100)*(baseY-topY);return {x:x,y:y,s:s}}),line=points.map(function(p,i){return (i?'L':'M')+p.x.toFixed(1)+' '+p.y function render(){renderHome();renderMeals();renderTraining();renderProfile();save()}function renderHome(){var p=total('protein'),c=total('calories');id('proteinNow').textContent=num(p);id('calorieNow').textContent=num(c);id('proteinGoalText').textContent=num(state.profile.proteinGoal);id('calorieGoalText').textContent=num(state.profile.calorieGoal);id('proteinBar').style.width=Math.min(100,p/state.profile.proteinGoal*100)+'%';id('calorieBar').style.width=Math.min(100,c/state.profile.calorieGoal*100)+'%';id('trainingSummary').textContent=state.training.sets.length?state.training.sets.length+' 筆 · 約 '+num(state.training.minutes)+' 分鐘':'尚未開始';id('todaySets').innerHTML=state.training.sets.length?state.training.sets.slice(-3).reverse().map(function(x,ri){return setHtml(x,state.training.sets.length-1-ri)}).join(''):'<p class="empty">還沒有訓練紀錄，去訓練頁選一個動作開始。</p>';id('heroTitle').textContent=p>=state.profile.proteinGoal?'蛋白質已達標，漂亮收工':'把訓練和蛋白質補齊';renderIntensity()}function renderMeals(){var qs=defaultQuicks.concat(state.quicks||[]);id('quickButtons').innerHTML=qs.map(function(q,i){return '<button class="chip" data-quick="'+esc(q.name)+'" data-protein="'+num(q.protein)+'" data-calories="'+num(q.calories)+'" data-carbs="'+num(q.carbs)+'" data-fat="'+num(q.fat)+'">'+esc(q.name)+' +'+num(q.protein)+'g</button>'}).join('');id('mealCount').textContent=state.meals.length+' 筆';id('mealList').innerHTML=state.meals.length?state.meals.map(mealHtml).join(''):'<p class="empty">還沒記餐點。可以先用雞蛋、蛋白飲或自己新增的快捷鍵。</p>'}function setStatus(msg,kind){var el=id('setStatus');if(!el)return;el.textContent=msg||'';el.style.color=kind==='ok'?'var(--green)':kind==='warn'?'var(--red)':'var(--dim)'}function renderTraining(){id('zoneButtons').innerHTML=Object.keys(library).map(function(k){return '<button type="button" class="chip '+(state.training.zone===k?'active':'')+'" data-zone="'+k+'">'+library[k].label+'</button>'}).join('');id('muscleButtons').innerHTML=Object.keys(muscles()).map(function(k){return '<button function addMeal(it){state.meals.push(Object.assign({id:Date.now()},it));render()}document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});document.querySelectorAll('.screen').forEach(function(x){x.classList.remove('active')});t.classList.add('active');document.querySelector('[data-screen="'+t.dataset.tab+'"]').classList.add('active');scrollTo({top:0,behavior:'smooth'})})});document.addEventListener('click',function(e){var q=e.target.closest('[data-quick]');if(q){addMeal({name:q.dataset.quick,protein:+q.dataset.protein,calories:+q.dataset.calories,carbs:+q.dataset.carbs,fat:+q.dataset.fat});return}var rm=e.target.closest('[data-rm-meal]');if(rm){state.meals.splice(+rm.dataset.rmMeal,1);render();return}var z=e.target.closest('[data-zone]');if(z){state.training.zone=z.dataset.zone;state.training.muscle=Object.keys(muscles())[0];state.training.selectedExercise='';render();return}var m=e.target.closest('[data-muscle]');if(m){state.training.muscle=m.dataset.muscle;state.training.selectedExercise='';render();return}var ex=e.target.closest('[data-exercise]');if(ex){state.training.selectedExercise=ex.dataset.exercise;render();setStatus('已選擇：'+state.training.selectedExercise,'ok');var repsEl=id('repsInput');if(repsEl)repsEl.focus();return}var rs=e.target.closest('[data-rm-set]');if(rs){state.training.sets.splice(+rs.dataset.rmSet,1);syncToday();render()}});id('mealForm').addEventListener('submit',function(e){e.preventDefault();var n=id('mealName').value.trim();if(!n)return;addMeal({name:n,protein:+id('mealProtein').value,calories:+id('mealCalories').value,carbs:+id('mealCarbs').value,fat:+id('mealFat').value});e.target.reset()});id('setForm').addEventListener('submit',function(e){e.preventDefault();var selected=state.training.selectedExercise;if(!selected){setStatus('請先點上面的動作，再加入訓練紀錄。','warn');return}var reps=Number(id('repsInput').value),sets=Number(id('se
