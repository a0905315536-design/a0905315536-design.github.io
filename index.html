<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050608">
  <title>CORE_OS</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050608;
      --bg-soft: #0b0d11;
      --panel: rgba(18, 21, 27, 0.82);
      --panel-solid: #12151b;
      --line: rgba(232, 238, 255, 0.12);
      --line-strong: rgba(96, 226, 232, 0.48);
      --text: #f1f5f9;
      --muted: #9aa6b2;
      --dim: #6f7b88;
      --cyan: #60e2e8;
      --blue: #79a7ff;
      --green: #7be3a2;
      --amber: #ffd166;
      --coral: #ff8b7b;
      --violet: #b6a4ff;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.38);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    body {
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #bioCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.62;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      width: min(100%, 440px);
      min-height: 100svh;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 16px calc(86px + env(safe-area-inset-bottom));
      background:
        linear-gradient(180deg, rgba(5, 6, 8, 0.64), rgba(5, 6, 8, 0.96) 38%, #050608 100%),
        radial-gradient(circle at 76% 8%, rgba(96, 226, 232, 0.12), transparent 34%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 64px;
      margin: 0 -16px;
      padding: 0 16px;
      background: rgba(5, 6, 8, 0.76);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(96, 226, 232, 0.54);
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(96, 226, 232, 0.16), rgba(123, 227, 162, 0.08));
      box-shadow: 0 0 24px rgba(96, 226, 232, 0.22);
    }

    .mark::before {
      width: 12px;
      height: 20px;
      content: "";
      border: 2px solid var(--cyan);
      border-top-color: transparent;
      border-bottom-color: var(--green);
      border-radius: 50%;
      transform: rotate(28deg);
    }

    .brand strong {
      display: block;
      font-size: 22px;
      line-height: 1;
      color: var(--cyan);
    }

    .brand span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.1;
    }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(18, 21, 27, 0.72);
      color: var(--text);
    }

    .icon-btn:active,
    .primary-btn:active,
    .chip:active,
    .nav-btn:active,
    .meal-row:active,
    .workout-row:active {
      transform: scale(0.97);
    }

    main {
      padding-top: 18px;
    }

    .screen {
      display: none;
      animation: lift 220ms ease both;
    }

    .screen.active {
      display: block;
    }

    @keyframes lift {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section {
      margin-bottom: 22px;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .kicker {
      color: var(--cyan);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      max-width: 340px;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 850;
    }

    h2 {
      font-size: 21px;
      line-height: 1.2;
    }

    h3 {
      font-size: 16px;
      line-height: 1.35;
    }

    .subtle {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .hero {
      display: grid;
      gap: 16px;
      margin-bottom: 22px;
    }

    .score-wrap {
      display: grid;
      grid-template-columns: 142px 1fr;
      gap: 14px;
      align-items: center;
    }

    .score {
      position: relative;
      display: grid;
      place-items: center;
      width: 142px;
      aspect-ratio: 1;
    }

    .score svg {
      width: 142px;
      height: 142px;
      transform: rotate(-90deg);
    }

    .score circle {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
    }

    .score .track {
      stroke: rgba(255, 255, 255, 0.08);
    }

    .score .progress {
      stroke: url(#ring);
      stroke-dasharray: 377;
      stroke-dashoffset: 101;
      filter: drop-shadow(0 0 8px rgba(96, 226, 232, 0.4));
    }

    .score-value {
      position: absolute;
      text-align: center;
    }

    .score-value strong {
      display: block;
      color: var(--cyan);
      font-size: 36px;
      line-height: 1;
    }

    .score-value span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric,
    .panel,
    .meal-row,
    .workout-row,
    .input-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .metric {
      min-height: 82px;
      padding: 12px;
    }

    .metric label,
    .input-box label {
      display: block;
      color: var(--dim);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 25px;
      line-height: 1;
    }

    .metric small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      padding: 14px;
    }

    .macro-grid {
      display: grid;
      gap: 10px;
    }

    .bar-row {
      display: grid;
      gap: 7px;
    }

    .bar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.08);
    }

    .bar span {
      display: block;
      width: var(--value);
      height: 100%;
      border-radius: inherit;
      background: var(--bar-color);
      box-shadow: 0 0 12px color-mix(in srgb, var(--bar-color), transparent 45%);
    }

    .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .chip {
      min-height: 56px;
      padding: 9px 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(18, 21, 27, 0.74);
      color: var(--muted);
      transition: 160ms ease;
    }

    .chip.active {
      border-color: var(--line-strong);
      color: var(--text);
      background: rgba(96, 226, 232, 0.13);
    }

    .chip strong {
      display: block;
      font-size: 13px;
    }

    .chip span {
      display: block;
      margin-top: 4px;
      font-size: 11px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .input-box {
      padding: 11px 12px;
    }

    .input-box.wide {
      grid-column: 1 / -1;
    }

    .input-box input,
    .input-box select {
      width: 100%;
      min-width: 0;
      margin-top: 6px;
      padding: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      font-weight: 800;
    }

    .input-box select {
      font-size: 18px;
    }

    .primary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      width: 100%;
      border-radius: var(--radius);
      background: linear-gradient(90deg, #79a7ff, #60e2e8 52%, #7be3a2);
      color: #061015;
      font-weight: 850;
      box-shadow: 0 16px 34px rgba(96, 226, 232, 0.2);
    }

    .ghost-btn {
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.04);
      color: var(--cyan);
      font-weight: 800;
    }

    .meal-list,
    .workout-list {
      display: grid;
      gap: 9px;
    }

    .meal-row,
    .workout-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      padding: 11px 12px;
      text-align: left;
    }

    .meal-row strong,
    .workout-row strong {
      display: block;
      font-size: 15px;
    }

    .meal-row span,
    .workout-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .meal-row b,
    .workout-row b {
      color: var(--cyan);
      font-size: 18px;
    }

    .quick-add {
      position: fixed;
      right: max(16px, calc((100vw - 440px) / 2 + 16px));
      bottom: calc(82px + env(safe-area-inset-bottom));
      z-index: 40;
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--blue), var(--cyan));
      color: #061015;
      font-size: 30px;
      font-weight: 700;
      box-shadow: 0 18px 34px rgba(96, 226, 232, 0.24);
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      width: min(100%, 440px);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 10, 14, 0.9);
      backdrop-filter: blur(22px);
      transform: translateX(-50%);
    }

    .nav-btn {
      display: grid;
      place-items: center;
      min-height: 54px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--dim);
      transition: 160ms ease;
    }

    .nav-btn.active {
      color: var(--cyan);
      background: rgba(96, 226, 232, 0.1);
    }

    .nav-icon {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .nav-label {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      font-weight: 800;
    }

    dialog {
      width: min(calc(100% - 28px), 408px);
      margin: auto;
      padding: 0;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel-solid);
      color: var(--text);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.62);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(4px);
    }

    .dialog-inner {
      padding: 16px;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .empty {
      padding: 24px 14px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(146px + env(safe-area-inset-bottom));
      z-index: 60;
      width: min(calc(100% - 32px), 408px);
      padding: 12px 14px;
      border: 1px solid rgba(96, 226, 232, 0.34);
      border-radius: var(--radius);
      background: rgba(18, 21, 27, 0.94);
      color: var(--text);
      font-size: 13px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 8px);
      transition: 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 360px) {
      .score-wrap {
        grid-template-columns: 1fr;
      }

      .score {
        margin: 0 auto;
      }

      h1 {
        font-size: 30px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="bioCanvas" aria-hidden="true"></canvas>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <strong>CORE_OS</strong>
          <span>Performance cockpit</span>
        </div>
      </div>
      <button class="icon-btn" id="openProfile" aria-label="設定個人資料">◎</button>
    </header>

    <main>
      <section class="screen active" id="dashboard" aria-label="今日總覽">
        <div class="hero">
          <div>
            <div class="kicker">Today</div>
            <h1>你的身體狀態，一眼校準。</h1>
          </div>
          <div class="score-wrap">
            <div class="score" aria-label="完成度 73%">
              <svg viewBox="0 0 142 142" role="img">
                <defs>
                  <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
                    <stop offset="0" stop-color="#79a7ff"></stop>
                    <stop offset="0.52" stop-color="#60e2e8"></stop>
                    <stop offset="1" stop-color="#7be3a2"></stop>
                  </linearGradient>
                </defs>
                <circle class="track" cx="71" cy="71" r="60"></circle>
                <circle class="progress" cx="71" cy="71" r="60"></circle>
              </svg>
              <div class="score-value">
                <strong id="readiness">73</strong>
                <span>READINESS</span>
              </div>
            </div>
            <div class="metrics">
              <div class="metric">
                <label>熱量</label>
                <strong><span id="caloriesNow">0</span></strong>
                <small>目標 <span id="calorieGoal">2500</span> kcal</small>
              </div>
              <div class="metric">
                <label>訓練</label>
                <strong><span id="trainingMin">0</span>m</strong>
                <small id="trainingLabel">等待啟動</small>
              </div>
              <div class="metric">
                <label>蛋白質</label>
                <strong><span id="proteinNow">0</span>g</strong>
                <small>今日累積</small>
              </div>
              <div class="metric">
                <label>體重</label>
                <strong><span id="weightNow">70</span>kg</strong>
                <small>目標 <span id="targetNow">66</span>kg</small>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>營養進度</h2>
            <button class="ghost-btn" data-open-meal>新增</button>
          </div>
          <div class="panel macro-grid">
            <div class="bar-row">
              <div class="bar-top"><span>熱量</span><span id="caloriePercent">0%</span></div>
              <div class="bar"><span id="calorieBar" style="--value:0%; --bar-color: var(--cyan);"></span></div>
            </div>
            <div class="bar-row">
              <div class="bar-top"><span>蛋白質</span><span id="proteinPercent">0%</span></div>
              <div class="bar"><span id="proteinBar" style="--value:0%; --bar-color: var(--green);"></span></div>
            </div>
            <div class="bar-row">
              <div class="bar-top"><span>碳水</span><span id="carbPercent">0%</span></div>
              <div class="bar"><span id="carbBar" style="--value:0%; --bar-color: var(--blue);"></span></div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>下一步</h2>
            <button class="ghost-btn" data-tab-jump="train">訓練</button>
          </div>
          <div class="workout-list">
            <button class="workout-row" data-start-workout="推拉腿 A" data-minutes="45">
              <span><strong>推拉腿 A</strong><span>胸、肩、三頭，45 分鐘</span></span>
              <b>Start</b>
            </button>
            <button class="workout-row" data-start-workout="Zone 2 有氧" data-minutes="30">
              <span><strong>Zone 2 有氧</strong><span>穩定心率，30 分鐘</span></span>
              <b>Start</b>
            </button>
          </div>
        </div>
      </section>

      <section class="screen" id="profile" aria-label="個人化設定">
        <div class="section">
          <div class="kicker">Personalization</div>
          <h1>建立你的 CORE_OS。</h1>
          <p class="subtle" style="margin-top: 10px;">每次調整都會同步更新 Dashboard 的目標與估算。</p>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>目標</h2>
          </div>
          <div class="chips" id="goalChips">
            <button class="chip" data-goal="減脂"><strong>減脂</strong><span>熱量赤字</span></button>
            <button class="chip active" data-goal="增肌"><strong>增肌</strong><span>力量成長</span></button>
            <button class="chip" data-goal="耐力"><strong>耐力</strong><span>心肺表現</span></button>
          </div>
        </div>

        <form class="section form-grid" id="profileForm">
          <label class="input-box">
            <span>身高 cm</span>
            <input id="heightInput" inputmode="decimal" type="number" min="120" max="230" value="175">
          </label>
          <label class="input-box">
            <span>體重 kg</span>
            <input id="weightInput" inputmode="decimal" type="number" min="35" max="220" value="70">
          </label>
          <label class="input-box">
            <span>目標 kg</span>
            <input id="targetInput" inputmode="decimal" type="number" min="35" max="220" value="66">
          </label>
          <label class="input-box">
            <span>活動量</span>
            <select id="activityInput">
              <option value="light">輕量</option>
              <option value="normal" selected>標準</option>
              <option value="high">高強度</option>
            </select>
          </label>
          <div class="input-box wide">
            <label for="sleepInput">睡眠小時</label>
            <input id="sleepInput" inputmode="decimal" type="number" min="0" max="12" step="0.5" value="7">
          </div>
          <button class="primary-btn wide" type="submit">儲存設定 →</button>
        </form>
      </section>

      <section class="screen" id="train" aria-label="訓練">
        <div class="section">
          <div class="kicker">Training</div>
          <h1>今天做對一組，也算推進。</h1>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>快速開始</h2>
          </div>
          <div class="workout-list">
            <button class="workout-row" data-start-workout="上肢力量" data-minutes="40">
              <span><strong>上肢力量</strong><span>臥推、划船、肩推</span></span>
              <b>40m</b>
            </button>
            <button class="workout-row" data-start-workout="下肢力量" data-minutes="45">
              <span><strong>下肢力量</strong><span>深蹲、硬舉、弓箭步</span></span>
              <b>45m</b>
            </button>
            <button class="workout-row" data-start-workout="恢復伸展" data-minutes="18">
              <span><strong>恢復伸展</strong><span>髖、胸椎、腿後側</span></span>
              <b>18m</b>
            </button>
          </div>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>本日紀錄</h2>
          </div>
          <div class="panel">
            <div class="bar-row">
              <div class="bar-top"><span id="workoutName">尚未開始</span><span><span id="trainPanelMin">0</span> 分鐘</span></div>
              <div class="bar"><span id="trainBar" style="--value:0%; --bar-color: var(--amber);"></span></div>
            </div>
          </div>
        </div>
      </section>

      <section class="screen" id="nutrition" aria-label="飲食紀錄">
        <div class="section">
          <div class="kicker">Nutrition Log</div>
          <h1>把今天吃的，變成可調整的資料。</h1>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>新增餐點</h2>
          </div>
          <form class="form-grid" id="mealForm">
            <label class="input-box wide">
              <span>餐點名稱</span>
              <input id="mealName" type="text" value="雞胸燕麥碗">
            </label>
            <label class="input-box">
              <span>熱量</span>
              <input id="mealCalories" inputmode="numeric" type="number" min="0" value="520">
            </label>
            <label class="input-box">
              <span>蛋白質 g</span>
              <input id="mealProtein" inputmode="numeric" type="number" min="0" value="42">
            </label>
            <label class="input-box">
              <span>碳水 g</span>
              <input id="mealCarbs" inputmode="numeric" type="number" min="0" value="58">
            </label>
            <label class="input-box">
              <span>脂肪 g</span>
              <input id="mealFat" inputmode="numeric" type="number" min="0" value="14">
            </label>
            <button class="primary-btn wide" type="submit">加入今日紀錄 →</button>
          </form>
        </div>

        <div class="section">
          <div class="section-head">
            <h2>今日餐點</h2>
            <button class="ghost-btn" id="clearMeals">清空</button>
          </div>
          <div class="meal-list" id="mealList"></div>
        </div>
      </section>
    </main>
  </div>

  <button class="quick-add" data-open-meal aria-label="快速新增餐點">+</button>

  <nav class="bottom-nav" aria-label="主選單">
    <button class="nav-btn active" data-tab="dashboard"><span class="nav-icon">⌂</span><span class="nav-label">Dash</span></button>
    <button class="nav-btn" data-tab="profile"><span class="nav-icon">◌</span><span class="nav-label">Profile</span></button>
    <button class="nav-btn" data-tab="train"><span class="nav-icon">▤</span><span class="nav-label">Train</span></button>
    <button class="nav-btn" data-tab="nutrition"><span class="nav-icon">＋</span><span class="nav-label">Log</span></button>
  </nav>

  <dialog id="mealDialog">
    <form class="dialog-inner" method="dialog">
      <div class="section-head">
        <h2>快速加入</h2>
        <button class="icon-btn" value="cancel" aria-label="關閉">×</button>
      </div>
      <div class="meal-list">
        <button class="meal-row" type="button" data-preset="鮭魚飯盒" data-calories="640" data-protein="38" data-carbs="72" data-fat="22">
          <span><strong>鮭魚飯盒</strong><span>640 kcal / P38 C72 F22</span></span>
          <b>加</b>
        </button>
        <button class="meal-row" type="button" data-preset="希臘優格莓果" data-calories="260" data-protein="24" data-carbs="32" data-fat="4">
          <span><strong>希臘優格莓果</strong><span>260 kcal / P24 C32 F4</span></span>
          <b>加</b>
        </button>
        <button class="meal-row" type="button" data-preset="牛肉蔬菜碗" data-calories="720" data-protein="46" data-carbs="68" data-fat="28">
          <span><strong>牛肉蔬菜碗</strong><span>720 kcal / P46 C68 F28</span></span>
          <b>加</b>
        </button>
      </div>
      <div class="dialog-actions">
        <button class="ghost-btn" value="cancel">取消</button>
        <button class="primary-btn" value="manual" id="manualMeal">手動輸入</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const defaultState = {
      profile: {
        goal: "增肌",
        height: 175,
        weight: 70,
        target: 66,
        activity: "normal",
        sleep: 7
      },
      meals: [
        { name: "燕麥蛋白碗", calories: 410, protein: 32, carbs: 48, fat: 10 },
        { name: "雞胸藜麥沙拉", calories: 560, protein: 46, carbs: 52, fat: 18 }
      ],
      training: {
        name: "",
        minutes: 0
      }
    };

    const storeKey = "core-os-mobile-state";
    let state = loadState();

    const $ = (selector) => document.querySelector(selector);
    const $$ = (selector) => Array.from(document.querySelectorAll(selector));

    function loadState() {
      try {
        const saved = localStorage.getItem(storeKey);
        return saved ? { ...defaultState, ...JSON.parse(saved) } : structuredClone(defaultState);
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveState() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function totals() {
      return state.meals.reduce((sum, meal) => ({
        calories: sum.calories + Number(meal.calories || 0),
        protein: sum.protein + Number(meal.protein || 0),
        carbs: sum.carbs + Number(meal.carbs || 0),
        fat: sum.fat + Number(meal.fat || 0)
      }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
    }

    function goals() {
      const activityMap = { light: 28, normal: 32, high: 36 };
      const base = Math.round(state.profile.weight * (activityMap[state.profile.activity] || 32));
      const offset = state.profile.goal === "減脂" ? -350 : state.profile.goal === "增肌" ? 250 : 0;
      const calories = Math.max(1400, base + offset);
      return {
        calories,
        protein: Math.round(state.profile.weight * 1.8),
        carbs: Math.round(state.profile.weight * 3.2),
        training: 45
      };
    }

    function pct(value, goal) {
      return Math.min(100, Math.round((Number(value || 0) / Math.max(1, Number(goal || 1))) * 100));
    }

    function render() {
      const total = totals();
      const goal = goals();
      const caloriePct = pct(total.calories, goal.calories);
      const proteinPct = pct(total.protein, goal.protein);
      const carbPct = pct(total.carbs, goal.carbs);
      const trainPct = pct(state.training.minutes, goal.training);
      const sleepScore = Math.min(100, Math.round((state.profile.sleep / 8) * 100));
      const readiness = Math.round((100 - Math.abs(75 - caloriePct) * 0.25 + sleepScore * 0.32 + trainPct * 0.24) / 1.55);

      $("#readiness").textContent = Math.max(48, Math.min(96, readiness));
      $("#caloriesNow").textContent = total.calories.toLocaleString("zh-Hant");
      $("#calorieGoal").textContent = goal.calories.toLocaleString("zh-Hant");
      $("#proteinNow").textContent = total.protein;
      $("#weightNow").textContent = state.profile.weight;
      $("#targetNow").textContent = state.profile.target;
      $("#trainingMin").textContent = state.training.minutes;
      $("#trainingLabel").textContent = state.training.name || "等待啟動";
      $("#caloriePercent").textContent = `${caloriePct}%`;
      $("#proteinPercent").textContent = `${proteinPct}%`;
      $("#carbPercent").textContent = `${carbPct}%`;
      $("#calorieBar").style.setProperty("--value", `${caloriePct}%`);
      $("#proteinBar").style.setProperty("--value", `${proteinPct}%`);
      $("#carbBar").style.setProperty("--value", `${carbPct}%`);
      $("#workoutName").textContent = state.training.name || "尚未開始";
      $("#trainPanelMin").textContent = state.training.minutes;
      $("#trainBar").style.setProperty("--value", `${trainPct}%`);

      $("#heightInput").value = state.profile.height;
      $("#weightInput").value = state.profile.weight;
      $("#targetInput").value = state.profile.target;
      $("#activityInput").value = state.profile.activity;
      $("#sleepInput").value = state.profile.sleep;

      $$("#goalChips .chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.goal === state.profile.goal);
      });

      const list = $("#mealList");
      list.innerHTML = "";
      if (!state.meals.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "今日還沒有餐點紀錄";
        list.append(empty);
      } else {
        state.meals.forEach((meal, index) => {
          const row = document.createElement("button");
          row.className = "meal-row";
          row.type = "button";
          row.innerHTML = `<span><strong>${escapeHtml(meal.name)}</strong><span>${meal.protein}g 蛋白質 · ${meal.carbs}g 碳水 · ${meal.fat}g 脂肪</span></span><b>${meal.calories}</b>`;
          row.addEventListener("click", () => removeMeal(index));
          list.append(row);
        });
      }

      saveState();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function addMeal(meal) {
      state.meals.unshift({
        name: meal.name || "未命名餐點",
        calories: Number(meal.calories || 0),
        protein: Number(meal.protein || 0),
        carbs: Number(meal.carbs || 0),
        fat: Number(meal.fat || 0)
      });
      render();
      notify("已加入今日紀錄");
    }

    function removeMeal(index) {
      state.meals.splice(index, 1);
      render();
      notify("已移除餐點");
    }

    function notify(message) {
      const toast = $("#toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(notify.timer);
      notify.timer = setTimeout(() => toast.classList.remove("show"), 1800);
      if ("vibrate" in navigator) navigator.vibrate(8);
    }

    function setTab(tabName) {
      $$(".screen").forEach((screen) => screen.classList.toggle("active", screen.id === tabName));
      $$(".nav-btn").forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === tabName));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    $$(".nav-btn").forEach((btn) => btn.addEventListener("click", () => setTab(btn.dataset.tab)));
    $$("[data-tab-jump]").forEach((btn) => btn.addEventListener("click", () => setTab(btn.dataset.tabJump)));
    $("#openProfile").addEventListener("click", () => setTab("profile"));

    $$("#goalChips .chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        state.profile.goal = chip.dataset.goal;
        render();
      });
    });

    $("#profileForm").addEventListener("submit", (event) => {
      event.preventDefault();
      state.profile.height = Number($("#heightInput").value || 175);
      state.profile.weight = Number($("#weightInput").value || 70);
      state.profile.target = Number($("#targetInput").value || 66);
      state.profile.activity = $("#activityInput").value;
      state.profile.sleep = Number($("#sleepInput").value || 7);
      render();
      notify("設定已儲存");
      setTab("dashboard");
    });

    $("#mealForm").addEventListener("submit", (event) => {
      event.preventDefault();
      addMeal({
        name: $("#mealName").value,
        calories: $("#mealCalories").value,
        protein: $("#mealProtein").value,
        carbs: $("#mealCarbs").value,
        fat: $("#mealFat").value
      });
    });

    $("#clearMeals").addEventListener("click", () => {
      state.meals = [];
      render();
      notify("今日餐點已清空");
    });

    $$("[data-start-workout]").forEach((btn) => {
      btn.addEventListener("click", () => {
        state.training.name = btn.dataset.startWorkout;
        state.training.minutes = Number(btn.dataset.minutes || 0);
        render();
        notify(`${state.training.name} 已完成紀錄`);
      });
    });

    $$("[data-open-meal]").forEach((btn) => {
      btn.addEventListener("click", () => $("#mealDialog").showModal());
    });

    $("#manualMeal").addEventListener("click", (event) => {
      event.preventDefault();
      $("#mealDialog").close();
      setTab("nutrition");
      setTimeout(() => $("#mealName").focus(), 120);
    });

    $$("#mealDialog [data-preset]").forEach((btn) => {
      btn.addEventListener("click", () => {
        addMeal({
          name: btn.dataset.preset,
          calories: btn.dataset.calories,
          protein: btn.dataset.protein,
          carbs: btn.dataset.carbs,
          fat: btn.dataset.fat
        });
        $("#mealDialog").close();
      });
    });

    function runCanvas() {
      const canvas = $("#bioCanvas");
      const ctx = canvas.getContext("2d");
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let width = 0;
      let height = 0;
      let tick = 0;

      function resize() {
        const ratio = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        const cx = width * 0.72;
        const cy = height * 0.22;
        const rings = 9;

        for (let i = 0; i < rings; i += 1) {
          const phase = tick * 0.018 + i * 0.65;
          const radiusX = 34 + i * 18;
          const radiusY = 16 + i * 9;
          ctx.beginPath();
          ctx.ellipse(cx + Math.sin(phase) * 18, cy + i * 46, radiusX, radiusY, phase * 0.22, 0, Math.PI * 2);
          ctx.strokeStyle = i % 2 ? "rgba(96, 226, 232, 0.2)" : "rgba(123, 227, 162, 0.16)";
          ctx.lineWidth = 1.2;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(cx + Math.cos(phase) * radiusX, cy + i * 46 + Math.sin(phase) * radiusY, 2.4, 0, Math.PI * 2);
          ctx.fillStyle = i % 2 ? "rgba(96, 226, 232, 0.72)" : "rgba(123, 227, 162, 0.58)";
          ctx.fill();
        }

        ctx.strokeStyle = "rgba(121, 167, 255, 0.1)";
        ctx.lineWidth = 1;
        for (let x = -20; x < width + 20; x += 42) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x - height * 0.18, height);
          ctx.stroke();
        }

        if (!reduceMotion) {
          tick += 1;
          requestAnimationFrame(draw);
        }
      }

      window.addEventListener("resize", resize);
      resize();
      draw();
    }

    render();
    runCanvas();
  </script>
</body>
</html>
